name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'   # 08:00 Beijing (morning)
    - cron: '0 4 * * *'   # 12:00 Beijing (noon)
    - cron: '0 10 * * *'  # 18:00 Beijing (evening)
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 8

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Commit article history
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/shown_articles.json
          git diff --staged --quiet || git commit -m "chore: update discovery history"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

