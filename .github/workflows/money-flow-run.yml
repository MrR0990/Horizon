name: Money Flow Radar (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Fetch content from last N hours'
        required: false
        default: '48'

jobs:
  money-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Use money-flow config
        run: cp data/config.money-flow.json data/config.json

      - name: Run Money Flow Radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours ${{ github.event.inputs.hours }}

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "💰 Money Flow Radar: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
